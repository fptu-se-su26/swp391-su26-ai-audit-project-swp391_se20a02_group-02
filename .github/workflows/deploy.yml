name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Connect and Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          command_timeout: 30m
          script: |
            cd /opt/luxeway
            
            # Ensure the remote is correctly set
            git remote set-url origin https://github.com/fptu-se-su26/swp391-su26-ai-audit-project-swp391_se20a02_group-02.git
            
            # Fetch the latest code from GitHub origin/main
            git fetch origin main || { echo "Git fetch failed"; exit 1; }
            
            # Hard reset VPS to exactly match GitHub origin/main (VPS must be a clean mirror)
            git reset --hard origin/main || { echo "Git reset failed"; exit 1; }
            
            # Remove untracked files (but preserve .env and other ignored files)
            git clean -fd
            
            # Deploy the application
            bash deploy.sh
