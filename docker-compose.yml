services:
  # ── Databases & Infrastructure ──────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: luxeway-sqlserver
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD:-SqlserverPass123!}"
      MSSQL_PID: "Developer"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${DB_PASSWORD:-SqlserverPass123!}", "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - luxeway-network


  # Database Automatic Initialization and Seeding
  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: luxeway-sqlserver-init
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./src/Back_end/src/main/resources/schema.sql:/tmp/schema.sql:ro
      - ./src/Back_end/import-data.sql:/tmp/import-data.sql:ro
    entrypoint:
      - /bin/bash
      - -c
      - |
        echo "=== [DB-INIT] Waiting 5 seconds for SQL Server port to stabilize ==="
        sleep 5
        
        # Check if database exists
        DB_EXISTS=$$(/opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P "${DB_PASSWORD:-SqlserverPass123!}" -C -h -1 -Q "IF DB_ID('car_rental_platform') IS NOT NULL PRINT 'YES' ELSE PRINT 'NO'")
        
        if [ "$$DB_EXISTS" = "YES" ]; then
          echo "=== [DB-INIT] Database 'car_rental_platform' already exists. Skipping initialization. ==="
        else
          echo "=== [DB-INIT] Creating database 'car_rental_platform' ==="
          /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P "${DB_PASSWORD:-SqlserverPass123!}" -C -Q "CREATE DATABASE car_rental_platform;"
          
          echo "=== [DB-INIT] Running schema.sql ==="
          /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P "${DB_PASSWORD:-SqlserverPass123!}" -C -d car_rental_platform -i /tmp/schema.sql
          
          echo "=== [DB-INIT] Running import-data.sql ==="
          /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P "${DB_PASSWORD:-SqlserverPass123!}" -C -d car_rental_platform -i /tmp/import-data.sql
          
          echo "=== [DB-INIT] Database initialization completed successfully! ==="
        fi
    networks:
      - luxeway-network

  redis:
    image: redis:7-alpine
    container_name: luxeway-redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - redis-data:/data
    networks:
      - luxeway-network

  # ── Core Services ────────────────────────────────────────────────────────────
  spring-backend:
    build:
      context: ./src/Back_end
      dockerfile: Dockerfile
    container_name: luxeway-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=sqlserver
      - DB_HOST=sqlserver
      - DB_PORT=1433
      - DB_NAME=car_rental_platform
      - DB_USERNAME=sa
      - DB_PASSWORD=${DB_PASSWORD:-SqlserverPass123!}
      - JWT_SECRET=${JWT_SECRET:-LuxeWaySecretKey2026VeryLongAndSecureJWTTokenKeyForDevelopment512BitSecretKeyExactlyHere}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-86400000}
      - JWT_REFRESH_EXPIRATION=${JWT_REFRESH_EXPIRATION:-604800000}
      - MAIL_USERNAME=${MAIL_USERNAME:-your-email@gmail.com}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-your-app-specific-password}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-your-google-client-id}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-your-google-client-secret}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://160.191.164.132:5173,http://160.191.164.132,http://luxeway.io.vn,https://luxeway.io.vn}
      - VNPAY_TMN_CODE=${VNPAY_TMN_CODE:-LUXEWAY01}
      - VNPAY_SECRET_KEY=${VNPAY_SECRET_KEY:-LUXEWAY_VNPAY_SECRET_KEY_2024}
      - VNPAY_URL=${VNPAY_URL:-https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
      - VNPAY_ALLOWED_IPS=${VNPAY_ALLOWED_IPS:-203.171.19.146,203.171.19.147}
      - STRIPE_PUBLIC_KEY=${STRIPE_PUBLIC_KEY:-pk_test_dev_luxeway_placeholder}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-sk_test_dev_luxeway_placeholder}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-your-gemini-api-key}
      - GOONG_API_KEY=${GOONG_API_KEY:-your-goong-api-key}
      - FPTAI_API_KEY=${FPTAI_API_KEY:-your-fptai-api-key}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-AC_twilio_sid_placeholder}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-twilio_auth_token_placeholder}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER:-+13502386697}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID:-luxeway-4add3}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL:-firebase-adminsdk-fbsvc@luxeway-4add3.iam.gserviceaccount.com}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY}
      - SESSION_SECRET=${SESSION_SECRET:-change-this-session-secret}
      - FRONTEND_URL=${FRONTEND_URL:-https://luxeway.io.vn}
    depends_on:
      sqlserver:
        condition: service_healthy
      sqlserver-init:
        condition: service_completed_successfully
    networks:
      - luxeway-network

  frontend:
    build:
      context: ./src/Front_end
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-/api/v1}
        - VITE_AUTH_API_URL=${VITE_AUTH_API_URL:-}
        - VITE_GOOGLE_REDIRECT_URI=${VITE_GOOGLE_REDIRECT_URI:-https://luxeway.io.vn/auth/google/success}
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID:-your-google-client-id}
        - VITE_GOONG_MAPTILES_KEY=${VITE_GOONG_MAPTILES_KEY:-MVEHK6ZSSm1tgi7DxoTpSctPEDPufxYYYf0NOmJ3}
        - VITE_FIREBASE_API_KEY=${VITE_FIREBASE_API_KEY:-your-firebase-api-key}
        - VITE_FIREBASE_AUTH_DOMAIN=${VITE_FIREBASE_AUTH_DOMAIN:-luxeway-4add3.firebaseapp.com}
        - VITE_FIREBASE_PROJECT_ID=${VITE_FIREBASE_PROJECT_ID:-luxeway-4add3}
        - VITE_FIREBASE_MESSAGING_SENDER_ID=${VITE_FIREBASE_MESSAGING_SENDER_ID:-167557599901}
        - VITE_FIREBASE_APP_ID=${VITE_FIREBASE_APP_ID:-1:167557599901:web:8620b719b942660de7ba74}
    container_name: luxeway-frontend
    ports:
      - "80:80"
      - "5173:80" # Keep 5173 for backward compatibility if needed
    depends_on:
      spring-backend:
        condition: service_started
    networks:
      - luxeway-network

  # ── Agent & ML Services ──────────────────────────────────────────────────────
  ml-sidecar:
    build:
      context: ./src/ml_service
      dockerfile: Dockerfile
    container_name: luxeway-ml-sidecar
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/ml/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - luxeway-network

  agent-service:
    build:
      context: ./agent-layer
      dockerfile: Dockerfile
    container_name: luxeway-agent-service
    ports:
      - "8001:8001"
    environment:
      - ENVIRONMENT=production
      - ML_SERVICE_URL=http://ml-sidecar:8000
      - BACKEND_URL=http://spring-backend:8080
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-default_secret_key_change_me_in_prod}
      - AGENT_API_KEY=${AGENT_API_KEY:-default_agent_key}
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=mssql+pyodbc://sa:${DB_PASSWORD:-SqlserverPass123!}@sqlserver:1433/car_rental_platform?driver=ODBC+Driver+17+for+SQL+Server
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      ml-sidecar:
        condition: service_healthy
      redis:
        condition: service_healthy
      spring-backend:
        condition: service_started
    networks:
      - luxeway-network

  # ── Observability ────────────────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    container_name: luxeway-mlflow
    ports:
      - "5000:5000"
    command: >
      mlflow server --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlflow/artifacts --host 0.0.0.0 --port 5000
    volumes:
      - mlflow-data:/mlflow
    networks:
      - luxeway-network

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: luxeway-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./agent-layer/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - luxeway-network

  grafana:
    image: grafana/grafana:10.4.0
    container_name: luxeway-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - luxeway-network

volumes:
  sqlserver-data:
  redis-data:
  mlflow-data:
  grafana-data:

networks:
  luxeway-network:
    driver: bridge
