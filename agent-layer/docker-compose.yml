version: "3.9"

services:
  # ── ML Sidecar (existing service) ──────────────────────────────────────────
  ml-sidecar:
    build:
      context: ../src/ml_service
      dockerfile: Dockerfile
    container_name: luxeway-ml-sidecar
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - luxeway-network

  # ── Agent Service ────────────────────────────────────────────────────────────
  agent-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: luxeway-agent-service
    ports:
      - "8001:8001"
    environment:
      - ENVIRONMENT=production
      - ML_SERVICE_URL=http://ml-sidecar:8000
      - BACKEND_URL=http://spring-backend:8080
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - AGENT_API_KEY=${AGENT_API_KEY}
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=mssql+pyodbc://sa:${DB_PASSWORD}@sqlserver:1433/luxeway?driver=ODBC+Driver+17+for+SQL+Server
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      ml-sidecar:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - luxeway-network

  # ── Redis (agent memory & checkpointing) ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: luxeway-redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - redis-data:/data
    networks:
      - luxeway-network

  # ── MLflow (model registry & experiment tracking) ─────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    container_name: luxeway-mlflow
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    volumes:
      - mlflow-data:/mlflow
    networks:
      - luxeway-network

  # ── Prometheus ────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: luxeway-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - luxeway-network

  # ── Grafana ───────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: luxeway-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - luxeway-network

volumes:
  redis-data:
  mlflow-data:
  grafana-data:

networks:
  luxeway-network:
    driver: bridge
