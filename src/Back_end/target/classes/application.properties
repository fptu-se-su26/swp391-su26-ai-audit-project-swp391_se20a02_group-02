# ============================================================
# LUXEWAY BACKEND CONFIGURATION
# ============================================================

spring.application.name=backend
spring.config.import=optional:file:.env[.properties]
server.port=${PORT:8080}
server.servlet.context-path=/api

app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:5173}
app.email.from=${MAIL_FROM:no-reply@luxeway.local}
google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID:}
google.oauth.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET:}
google.oauth.redirect-uri=${GOOGLE_OAUTH_REDIRECT_URI:http://localhost:8080/api/auth/google/callback}
google.oauth.success-redirect=${GOOGLE_OAUTH_SUCCESS_REDIRECT:http://localhost:5173/auth/google/success}
google.oauth.failure-redirect=${GOOGLE_OAUTH_FAILURE_REDIRECT:http://localhost:5173/login}
app.jwt.secret=${JWT_SECRET:dev-only-change-this-secret-before-production}
app.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:86400}

# ============================================================
# OPTION 1: IN-MEMORY H2 DATABASE (DEFAULT - RUNS OUT-OF-THE-BOX)
# ============================================================
spring.datasource.url=jdbc:h2:mem:luxewaydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=YEAR
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ============================================================
# OPTION 2: MICROSOFT SQL SERVER (UNCOMMENT TO USE)
# ============================================================
# spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=LuxeWayDB;encrypt=true;trustServerCertificate=true
# spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver
# spring.datasource.username=sa
# spring.datasource.password=YourStrongPasswordHere
# spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

# ============================================================
# JPA & HIBERNATE SETTINGS
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}

# ============================================================
# H2 CONSOLE (ACCESS VIA http://localhost:8080/api/h2-console)
# ============================================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
# Disable frame-options headers to allow H2 Console in the browser
spring.headers.frame-options.disable=true
