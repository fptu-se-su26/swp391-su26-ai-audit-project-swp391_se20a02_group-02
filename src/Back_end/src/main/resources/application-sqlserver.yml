spring:
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=car_rental_platform;encrypt=false;trustServerCertificate=true
    username: hau
    password: 123456
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  sql:
    init:
      mode: never
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        format_sql: true
    defer-datasource-initialization: true

  # Google OAuth - uncomment và điền credentials thật để bật Google Login
  # security:
  #   oauth2:
  #     client:
  #       registration:
  #         google:
  #           client-id: YOUR_GOOGLE_CLIENT_ID
  #           client-secret: YOUR_GOOGLE_CLIENT_SECRET
