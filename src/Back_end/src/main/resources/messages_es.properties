# Email Body Templates
email.otp.body=<h2>Recuperación de cuenta LuxeWay</h2><p>Solicitó restablecer su contraseña. Su código de verificación OTP es:</p><h1 style='color: #4F46E5; font-size: 32px; letter-spacing: 5px;'>{0}</h1><p>Este código vencerá en 5 minutos. Si no solicitó esto, ignore este correo electrónico.</p>
email.reset.body=<h2>Recuperación de cuenta LuxeWay</h2><p>Solicitó restablecer su contraseña. Utilice el siguiente enlace para restablecer su contraseña:</p><p><a href="{0}" style="display: inline-block; padding: 12px 24px; background-color: #4F46E5; color: white; text-decoration: none; border-radius: 4px; font-weight: bold;">Restablecer contraseña</a></p><p>O copie y pegue esta URL en su navegador:</p><p>{0}</p><p>Este enlace vencerá en 15 minutes. Si no solicitó esto, ignore este correo electrónico.</p>
email.booking.confirm.body=<h2>¡Gracias por su reserva en LuxeWay!</h2><p>Su reserva ha sido confirmada con éxito. A continuación se detallan los datos:</p><ul><li><b>Vehículo:</b> {0} {1}</li><li><b>Periodo:</b> {2} a {3}</li><li><b>Total de días:</b> {4}</li><li><b>Total pagado:</b> {5}</li></ul><p>Puede gestionar su reserva desde su panel de control en cualquier momento.</p>
email.invoice.body=<h2>Su factura PDF de LuxeWay está lista</h2><p>¡Gracias por elegir LuxeWay! Se adjunta su factura oficial <b>{0}</b> para la reserva <b>#{1}</b>.</p><p>Importe total: <b>{2}</b></p><p>Consulte el PDF adjunto para ver el desglose detallado de precios diarios.</p>
email.dispute.body=<h2>Centro de resolución de disputas de LuxeWay</h2><p>El estado de su ticket de disputa <b>#{0}</b> ha sido actualizado.</p><p>Nuevo estado: <b style='color: #DC2626;'>{1}</b></p><p>Notas de resolución actuales: {2}</p>
email.reset.success.body=<h2>Contraseña restablecida con éxito</h2><p>La contraseña de su cuenta LuxeWay se ha restablecido con éxito.</p><p>Si no inició esta solicitud, póngase en contacto con nuestro equipo de asistencia de inmediato.</p>
email.welcome.body=<h2>¡Bienvenido a LuxeWay, {0}!</h2><p>Gracias por registrarse. Su dirección de correo electrónico se ha verificado con éxito y su cuenta está activa.</p><p>Inicie sesión para buscar vehículos premium o publicar su flota.</p>
email.booking.cancel.body=<h2>Reserva de LuxeWay cancelada</h2><p>Su reserva <b>#{0}</b> ha sido cancelada.</p><ul><li><b>Vehículo:</b> {1} {2}</li><li><b>Fechas:</b> {3} a {4}</li><li><b>Total de días:</b> {5}</li><li><b>Importe del reembolso:</b> {6}</li></ul><p>Si tiene alguna pregunta, póngase en contacto con nuestro centro de resolución de disputas.</p>
email.booking.approved.body=<h2>Reserva de LuxeWay aprobada</h2><p>Su solicitud de reserva <b>#{0}</b> ha sido aprobada por el propietario del vehículo.</p><ul><li><b>Vehículo:</b> {1} {2}</li><li><b>Fechas:</b> {3} a {4}</li></ul><p>Inicie sesión en su panel para completar el registro cuando comience el alquiler.</p>
email.booking.rejected.body=<h2>Solicitud de reserva de LuxeWay rechazada</h2><p>Su solicitud de reserva <b>#{0}</b> fue rechazada por el propietario.</p><p>Motivo: {1}</p><p>Cualquier retención o pago preautorizado ha sido reembolsado a su LuxeWallet o método de pago.</p>
email.kyc.body=<h2>Actualización de verificación de identidad</h2><p>El documento cargado (<b>{0}</b>) ha sido revisado por nuestro equipo de cumplimiento.</p><p>Estado: <b style='color: {1};'>{2}</b></p>{3}<p>Consulte su panel de control para obtener más detalles.</p>
email.vehicle.body=<h2>Moderación de anuncio de vehículo</h2><p>Su anuncio para <b>{0} {1} ({2})</b> ha sido revisado.</p><p>Estado: <b style='color: {3};'>{4}</b></p>{5}<p>Gracias por asociarse con LuxeWay.</p>

