# Email Body Templates
email.otp.body=<h2>Khôi Phục Tài Khoản LuxeWay</h2><p>Bạn đã yêu cầu đặt lại mật khẩu. Mã OTP xác nhận của bạn là:</p><h1 style='color: #4F46E5; font-size: 32px; letter-spacing: 5px;'>{0}</h1><p>Mã này sẽ hết hạn sau 5 phút. Nếu bạn không yêu cầu điều này, xin vui lòng bỏ qua email này.</p>
email.reset.body=<h2>Khôi Phục Tài Khoản LuxeWay</h2><p>Bạn đã yêu cầu đặt lại mật khẩu. Vui lòng sử dụng liên kết dưới đây để đặt lại mật khẩu của bạn:</p><p><a href="{0}" style="display: inline-block; padding: 12px 24px; background-color: #4F46E5; color: white; text-decoration: none; border-radius: 4px; font-weight: bold;">Đặt Lại Mật Khẩu</a></p><p>Hoặc sao chép và dán URL này vào trình duyệt của bạn:</p><p>{0}</p><p>Liên kết này sẽ hết hạn sau 15 phút. Nếu bạn không yêu cầu điều này, xin vui lòng bỏ qua email này.</p>
email.booking.confirm.body=<h2>Cảm ơn bạn đã đặt xe tại LuxeWay!</h2><p>Yêu cầu đặt xe của bạn đã được xác nhận thành công. Dưới đây là thông tin chi tiết:</p><ul><li><b>Phương Tiện:</b> {0} {1}</li><li><b>Thời gian:</b> {2} đến {3}</li><li><b>Tổng số ngày:</b> {4}</li><li><b>Tổng tiền đã thanh toán:</b> {5}</li></ul><p>Bạn có thể quản lý đặt xe từ trang quản lý của mình bất cứ lúc nào.</p>
email.invoice.body=<h2>Hóa Đơn PDF LuxeWay Của Bạn Đã Sẵn Sàng</h2><p>Cảm ơn bạn đã lựa chọn LuxeWay! Đính kèm là hóa đơn chính thức <b>{0}</b> cho đơn đặt xe <b>#{1}</b>.</p><p>Tổng tiền: <b>{2}</b></p><p>Vui lòng xem file PDF đính kèm để biết chi tiết giá hàng ngày.</p>
email.dispute.body=<h2>Trung Tâm Giải Quyết Tranh Chấp LuxeWay</h2><p>Trạng thái yêu cầu tranh chấp <b>#{0}</b> của bạn đã được cập nhật.</p><p>Trạng thái mới: <b style='color: #DC2626;'>{1}</b></p><p>Ghi chú giải quyết hiện tại: {2}</p>
email.reset.success.body=<h2>Đặt Lại Mật Khẩu Thành Công</h2><p>Mật khẩu tài khoản LuxeWay của bạn đã được đặt lại thành công.</p><p>Nếu bạn không thực hiện yêu cầu này, xin vui lòng liên hệ với đội ngũ hỗ trợ của chúng tôi ngay lập tức.</p>
email.welcome.body=<h2>Chào mừng đến với LuxeWay, {0}!</h2><p>Cảm ơn bạn đã đăng ký. Địa chỉ email của bạn đã được xác minh thành công và tài khoản của bạn đã hoạt động.</p><p>Đăng nhập để tìm kiếm xe sang hoặc đăng ký đội xe của bạn.</p>
email.booking.cancel.body=<h2>Đơn Đặt Xe LuxeWay Đã Bị Hủy</h2><p>Đơn đặt xe <b>#{0}</b> của bạn đã bị hủy.</p><ul><li><b>Phương Tiện:</b> {1} {2}</li><li><b>Thời gian:</b> {3} đến {4}</li><li><b>Tổng số ngày:</b> {5}</li><li><b>Số tiền hoàn trả:</b> {6}</li></ul><p>Nếu bạn có bất kỳ câu hỏi nào, xin vui lòng liên hệ với trung tâm giải quyết tranh chấp của chúng tôi.</p>
email.booking.approved.body=<h2>Đơn Đặt Xe LuxeWay Đã Được Phê Duyệt</h2><p>Yêu cầu đặt xe <b>#{0}</b> của bạn đã được chủ xe phê duyệt.</p><ul><li><b>Phương Tiện:</b> {1} {2}</li><li><b>Thời gian:</b> {3} đến {4}</li></ul><p>Vui lòng đăng nhập vào trang quản lý để hoàn tất việc nhận xe khi chuyến đi bắt đầu.</p>
email.booking.rejected.body=<h2>Đơn Đặt Xe LuxeWay Bị Từ Chối</h2><p>Yêu cầu đặt xe <b>#{0}</b> của bạn đã bị chủ xe từ chối.</p><p>Lý do: {1}</p><p>Mọi khoản tiền tạm giữ hoặc thanh toán trước đã được hoàn trả lại vào ví LuxeWallet hoặc phương thức thanh toán của bạn.</p>
email.kyc.body=<h2>Cập Nhật Xác Thực Danh Tính</h2><p>Tài liệu bạn đã tải lên (<b>{0}</b>) đã được xem xét bởi bộ phận tuân thủ của chúng tôi.</p><p>Trạng thái: <b style='color: {1};'>{2}</b></p>{3}<p>Vui lòng xem trang quản lý của bạn để biết chi tiết.</p>
email.vehicle.body=<h2>Phê Duyệt Đăng Xe</h2><p>Yêu cầu đăng xe <b>{0} {1} ({2})</b> của bạn đã được xem xét.</p><p>Trạng thái: <b style='color: {3};'>{4}</b></p>{5}<p>Cảm ơn bạn đã đồng hành cùng LuxeWay.</p>

