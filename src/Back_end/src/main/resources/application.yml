spring:
  application:
    name: luxeway-backend

  main:
    allow-circular-references: true

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:sqlserver}

  # File Upload Configuration
  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 50MB
      file-size-threshold: 2KB

  # Mail Configuration (Gmail SMTP)
  # SECURITY: Use environment variables - NEVER hardcode credentials
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:default_mail_username}
    password: ${MAIL_PASSWORD:default_mail_password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:default_client_id}
            client-secret: ${GOOGLE_CLIENT_SECRET:default_client_secret}
            scope:
              - email
              - profile

# Application Configuration
app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /
  tomcat:
    max-swallow-size: -1    # -1 = unlimited; prevents "Failed to parse multipart" for large images

# JWT Configuration
# SECURITY: MUST set JWT_SECRET environment variable with 256-bit random key
# Generate with: openssl rand -base64 32
jwt:
  secret: ${JWT_SECRET:your_very_long_secure_secret_key_for_jwt_signing_must_be_256_bits_12345}
  expiration: ${JWT_EXPIRATION:86400000}       # 24 hours in milliseconds
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 7 days in milliseconds

# File Storage Configuration
file:
  upload-dir: uploads/
  max-size: 10MB

# Logging Configuration
# SECURITY: Set to INFO or WARN in production (DEBUG exposes sensitive data)
logging:
  level:
    com.luxeway: ${LOG_LEVEL:INFO}
    org.springframework.security: ${LOG_LEVEL:INFO}
    org.hibernate.SQL: ${LOG_LEVEL:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# CORS Configuration
# SECURITY: Update allowed-origins for production
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:5173}
  allowed-methods:
    - GET
    - POST
    - PUT
    - DELETE
    - PATCH
    - OPTIONS
  allowed-headers: "*"
  allow-credentials: true

# Payment Configuration
# SECURITY: MUST set payment gateway credentials via environment variables
payment:
  vnpay:
    tmn-code: ${VNPAY_TMN_CODE:default_tmn_code}
    secret-key: ${VNPAY_SECRET_KEY:default_secret_key}
    url: ${VNPAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
    return-url: ${FRONTEND_URL}/payment/vnpay/return
    # VNPay callback IP whitelist for security (comma-separated)
    allowed-ips: ${VNPAY_ALLOWED_IPS:203.171.19.146,203.171.19.147,203.171.19.148}
  stripe:
    public-key: ${STRIPE_PUBLIC_KEY:default_stripe_public_key}
    secret-key: ${STRIPE_SECRET_KEY:default_stripe_secret_key}

# Business Rules
business:
  booking:
    max-advance-days: 365
    min-rental-days: 1
    max-rental-days: 30
    cancellation-hours: 24
  pricing:
    service-fee-rate: 0.12
    tax-rate: 0.08
    platform-commission: 0.15

# FPT.AI eKYC Configuration
fpt:
  ekyc:
    api-key: ${FPT_API_KEY:nJG3NY4baB7oL9sF16mwVBxSnD2kPyx1}
    idr-url: ${FPT_IDR_URL:https://api.fpt.ai/vision/idr/vnm}
    face-match-url: ${FPT_FACE_MATCH_URL:https://api.fpt.ai/vision/faceid/vnm}