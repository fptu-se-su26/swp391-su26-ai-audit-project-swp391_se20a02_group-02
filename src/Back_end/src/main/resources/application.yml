spring:
  application:
    name: luxeway-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:sqlserver}

  # File Upload Configuration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  # Mail Configuration (Gmail SMTP)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /api/v1

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:LuxeWaySecretKeyForJWTTokenGenerationAndValidation2024VN}
  expiration: 86400000       # 24 hours in milliseconds
  refresh-expiration: 604800000 # 7 days in milliseconds

# File Storage Configuration
file:
  upload-dir: uploads/
  max-size: 10MB

# Logging Configuration
logging:
  level:
    com.luxeway: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# CORS Configuration
cors:
  allowed-origins:
    - http://localhost:3000
    - http://localhost:5173
    - http://127.0.0.1:5173
  allowed-methods:
    - GET
    - POST
    - PUT
    - DELETE
    - PATCH
    - OPTIONS
  allowed-headers: "*"
  allow-credentials: true

# Payment Configuration
payment:
  vnpay:
    tmn-code: ${VNPAY_TMN_CODE:2QXGXM8Y}
    secret-key: ${VNPAY_SECRET_KEY:IKGZVMMTMTUYKQLJILPBYXJVHOUCGFDF}
    url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
    return-url: http://localhost:5173/payment/vnpay/return
  stripe:
    public-key: ${STRIPE_PUBLIC_KEY:pk_test_your_stripe_public_key}
    secret-key: ${STRIPE_SECRET_KEY:sk_test_your_stripe_secret_key}

# Business Rules
business:
  booking:
    max-advance-days: 365
    min-rental-days: 1
    max-rental-days: 30
    cancellation-hours: 24
  pricing:
    service-fee-rate: 0.12
    tax-rate: 0.08
    platform-commission: 0.15