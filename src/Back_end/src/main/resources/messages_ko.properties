# Email Body Templates
email.otp.body=<h2>LuxeWay 계정 복구</h2><p>비밀번호 재설정을 요청하셨습니다. OTP 인증 코드는 다음과 같습니다:</p><h1 style='color: #4F46E5; font-size: 32px; letter-spacing: 5px;'>{0}</h1><p>이 코드는 5분간 유효합니다. 본인이 요청하지 않은 경우 이 이메일을 무시하십시오.</p>
email.reset.body=<h2>LuxeWay 계정 복구</h2><p>비밀번호 재설정을 요청하셨습니다. 아래 링크를 사용하여 비밀번호를 재설정하십시오:</p><p><a href="{0}" style="display: inline-block; padding: 12px 24px; background-color: #4F46E5; color: white; text-decoration: none; border-radius: 4px; font-weight: bold;">비밀번호 재설정</a></p><p>또는 다음 URL을 복사하여 브라우저에 붙여넣으십시오:</p><p>{0}</p><p>이 링크는 15분간 유효합니다. 본인이 요청하지 않은 경우 이 이메일을 무시하십시오.</p>
email.booking.confirm.body=<h2>LuxeWay를 이용해 주셔서 감사합니다!</h2><p>예약이 정상적으로 확정되었습니다. 세부 정보는 다음과 같습니다:</p><ul><li><b>차량:</b> {0} {1}</li><li><b>대여 기간:</b> {2} ~ {3}</li><li><b>총 대여일수:</b> {4}일</li><li><b>결제 총액:</b> {5}</li></ul><p>언제든지 마이 대시보드에서 예약을 관리할 수 있습니다.</p>
email.invoice.body=<h2>LuxeWay PDF 청구서가 준비되었습니다</h2><p>LuxeWay를 선택해 주셔서 감사합니다! 예약 <b>#{1}</b>에 대한 공식 청구서 <b>{0}</b>를 첨부하여 보냅니다.</p><p>총 금액: <b>{2}</b></p><p>일별 가격 상세 내역은 첨부된 PDF 파일을 확인해 주시기 바랍니다.</p>
email.dispute.body=<h2>LuxeWay 분쟁 해결 센터</h2><p>고객님의 분쟁 티켓 <b>#{0}</b> 상태가 업데이트되었습니다.</p><p>새로운 상태: <b style='color: #DC2626;'>{1}</b></p><p>현재 해결 노트: {2}</p>
email.reset.success.body=<h2>비밀번호 재설정 완료</h2><p>LuxeWay 계정 비밀번호가 성공적으로 재설정되었습니다.</p><p>비밀번호를 재설정한 기억이 없다면 즉시 지원 팀으로 연락해 주십시오.</p>
email.welcome.body=<h2>LuxeWay 가입을 환영합니다, {0}님!</h2><p>가입해 주셔서 감사합니다. 이메일 주소가 성공적으로 인증되어 계정이 활성화되었습니다.</p><p>로그인하여 프리미엄 차량을 검색하거나 파트너 차량을 등록해 보십시오.</p>
email.booking.cancel.body=<h2>LuxeWay 예약 취소 안내</h2><p>예약 <b>#{0}</b>이 취소되었습니다.</p><ul><li><b>차량:</b> {1} {2}</li><li><b>기간:</b> {3} ~ {4}</li><li><b>총 대여일수:</b> {5}일</li><li><b>환불 금액:</b> {6}</li></ul><p>질문이 있으시면 분쟁 해결 센터로 문의해 주시기 바랍니다.</p>
email.booking.approved.body=<h2>LuxeWay 예약 승인</h2><p>예약 요청 <b>#{0}</b>이 차량 소유주에 의해 승인되었습니다.</p><ul><li><b>차량:</b> {1} {2}</li><li><b>대여 기간:</b> {3} ~ {4}</li></ul><p>대여 시작 시 대시보드에 로그인하여 체크인을 진행해 주십시오.</p>
email.booking.rejected.body=<h2>LuxeWay 예약 요청 거절</h2><p>예약 요청 <b>#{0}</b>이 소유주에 의해 거절되었습니다.</p><p>거절 사유: {1}</p><p>승인 대기 금액 또는 사전 결제된 금액은 LuxeWallet 또는 이전 결제 수단으로 전액 환불되었습니다.</p>
email.kyc.body=<h2>신원 인증 상태 업데이트</h2><p>업로드하신 문서 (<b>{0}</b>)가 규정 준수 팀에 의해 검토 완료되었습니다.</p><p>상태: <b style='color: {1};'>{2}</b></p>{3}<p>자세한 내용은 대시보드를 확인하십시오.</p>
email.vehicle.body=<h2>차량 승인 심사 업데이트</h2><p>등록 신청하신 차량 <b>{0} {1} ({2})</b>의 검토가 완료되었습니다.</p><p>상태: <b style='color: {3};'>{4}</b></p>{5}<p>LuxeWay의 파트너가 되어 주셔서 감사합니다.</p>
