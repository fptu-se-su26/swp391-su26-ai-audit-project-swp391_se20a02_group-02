# Email Body Templates
email.otp.body=<h2>LuxeWay 账号找回</h2><p>您申请了重置密码。您的安全OTP验证码为：</p><h1 style='color: #4F46E5; font-size: 32px; letter-spacing: 5px;'>{0}</h1><p>此验证码将在5分钟内过期。如果您没有申请此操作，请忽略此邮件。</p>
email.reset.body=<h2>LuxeWay 账号找回</h2><p>您申请了重置密码。请点击下方链接重置您的密码：</p><p><a href="{0}" style="display: inline-block; padding: 12px 24px; background-color: #4F46E5; color: white; text-decoration: none; border-radius: 4px; font-weight: bold;">重置密码</a></p><p>或者复制此链接并在浏览器中打开：</p><p>{0}</p><p>此链接将在15分钟内失效。如果您没有申请此操作，请忽略此邮件。</p>
email.booking.confirm.body=<h2>感谢您在 LuxeWay 预订！</h2><p>您的预订已成功确认，以下是您的订单详情：</p><ul><li><b>车辆信息:</b> {0} {1}</li><li><b>预订租期:</b> {2} 至 {3}</li><li><b>总天数:</b> {4} 天</li><li><b>已支付金额:</b> {5}</li></ul><p>您可以随时登录个人控制台管理您的订单。</p>
email.invoice.body=<h2>您的 LuxeWay PDF 账单已生成</h2><p>感谢您选择 LuxeWay！附件中是订单 <b>#{1}</b> 的官方账单 <b>{0}</b>。</p><p>总金额: <b>{2}</b></p><p>请查看附件中的PDF以获取每日费用的详细明细。</p>
email.dispute.body=<h2>LuxeWay 纠纷解决中心</h2><p>您的申诉工单 <b>#{0}</b> 状态已更新。</p><p>最新状态: <b style='color: #DC2626;'>{1}</b></p><p>当前处理意见: {2}</p>
email.reset.success.body=<h2>密码重置成功</h2><p>您的 LuxeWay 账号密码已成功重置。</p><p>如果您没有执行此操作，请立即联系我们的客服团队。</p>
email.welcome.body=<h2>欢迎来到 LuxeWay, {0}!</h2><p>感谢您的注册。您的邮箱地址已成功验证，您的账号现在可以正常使用了。</p><p>登录即可搜索高品质豪车或开始发布您的车辆。</p>
email.booking.cancel.body=<h2>LuxeWay 订单已取消</h2><p>您的预订订单 <b>#{0}</b> 已被取消。</p><ul><li><b>车辆信息:</b> {1} {2}</li><li><b>租期:</b> {3} 至 {4}</li><li><b>总天数:</b> {5} 天</li><li><b>退款金额:</b> {6}</li></ul><p>如有任何疑问，请联系我们的纠纷申诉中心。</p>
email.booking.approved.body=<h2>LuxeWay 订单已批准</h2><p>您的预订申请 <b>#{0}</b> 已被车主批准。</p><ul><li><b>车辆信息:</b> {1} {2}</li><li><b>租期:</b> {3} 至 {4}</li></ul><p>租期开始时，请登录您的控制台办理提车确认手续。</p>
email.booking.rejected.body=<h2>LuxeWay 预订申请被拒绝</h2><p>您的预订申请 <b>#{0}</b> 被车主拒绝了。</p><p>拒绝原因: {1}</p><p>所有预授权押金或已付款项已退回到您的 LuxeWallet 钱包或原支付账户中。</p>
email.kyc.body=<h2>身份认证状态更新</h2><p>您上传的身份证明材料 (<b>{0}</b>) 已由我们的合规团队审核完毕。</p><p>审核结果: <b style='color: {1};'>{2}</b></p>{3}<p>请登录控制台查看详情。</p>
email.vehicle.body=<h2>车辆发布审核结果</h2><p>您申请发布的车辆 <b>{0} {1} ({2})</b> 已审核完毕。</p><p>审核结果: <b style='color: {3};'>{4}</b></p>{5}<p>感谢您与 LuxeWay 携手共赢。</p>
