# Email Body Templates
email.otp.body=<h2>LuxeWay Kontowiederherstellung</h2><p>Sie haben das Zurücksetzen Ihres Passworts angefordert. Ihr OTP-Bestätigungscode lautet:</p><h1 style='color: #4F46E5; font-size: 32px; letter-spacing: 5px;'>{0}</h1><p>Dieser Code läuft in 5 Minuten ab. Wenn Sie dies nicht angefordert haben, ignorieren Sie diese E-Mail bitte.</p>
email.reset.body=<h2>LuxeWay Kontowiederherstellung</h2><p>Sie haben das Zurücksetzen Ihres Passworts angefordert. Bitte verwenden Sie den unten stehenden Link, um Ihr Passwort zurückzusetzen:</p><p><a href="{0}" style="display: inline-block; padding: 12px 24px; background-color: #4F46E5; color: white; text-decoration: none; border-radius: 4px; font-weight: bold;">Passwort zurücksetzen</a></p><p>Oder kopieren Sie diese URL und fügen Sie sie in Ihren Browser ein:</p><p>{0}</p><p>Dieser Link läuft in 15 Minuten ab. Wenn Sie dies nicht angefordert haben, ignorieren Sie diese E-Mail bitte.</p>
email.booking.confirm.body=<h2>Vielen Dank für Ihre Buchung bei LuxeWay!</h2><p>Ihre Buchung wurde erfolgreich bestätigt. Nachfolgend finden Sie die Details:</p><ul><li><b>Fahrzeug:</b> {0} {1}</li><li><b>Mietzeitraum:</b> {2} bis {3}</li><li><b>Tage insgesamt:</b> {4}</li><li><b>Bezahlter Gesamtbetrag:</b> {5}</li></ul><p>Sie können Ihre Buchung jederzeit in Ihrem Kunden-Dashboard verwalten.</p>
email.invoice.body=<h2>Ihre LuxeWay PDF-Rechnung ist bereit</h2><p>Vielen Dank, dass Sie sich für LuxeWay entschieden haben! Anbei finden Sie Ihre offizielle Rechnung <b>{0}</b> für die Buchung <b>#{1}</b>.</p><p>Gesamtbetrag: <b>{2}</b></p><p>Bitte sehen Sie sich das beigefügte PDF-Dokument für eine detaillierte tägliche Preisaufstellung an.</p>
email.dispute.body=<h2>LuxeWay Streitbeilegungsstelle</h2><p>Der Status Ihres Streitfalls <b>#{0}</b> wurde aktualisiert.</p><p>Neuer Status: <b style='color: #DC2626;'>{1}</b></p><p>Aktuelle Hinweise zur Beilegung: {2}</p>
email.reset.success.body=<h2>Passwort erfolgreich zurückgesetzt</h2><p>Ihr LuxeWay-Passwort wurde erfolgreich zurückgesetzt.</p><p>Wenn Sie diese Anfrage nicht initiiert haben, wenden Sie sich bitte umgehend an unser Support-Team.</p>
email.welcome.body=<h2>Willkommen bei LuxeWay, {0}!</h2><p>Vielen Dank für Ihre Registrierung. Ihre E-Mail-Adresse wurde erfolgreich bestätigt und Ihr Konto ist nun aktiv.</p><p>Melden Sie sich an, um nach Premium-Fahrzeugen zu suchen oder Ihre Flotte einzustellen.</p>
email.booking.cancel.body=<h2>LuxeWay Buchung storniert</h2><p>Ihre Buchung <b>#{0}</b> wurde storniert.</p><ul><li><b>Fahrzeug:</b> {1} {2}</li><li><b>Mietzeitraum:</b> {3} bis {4}</li><li><b>Tage insgesamt:</b> {5}</li><li><b>Rückerstattungsbetrag:</b> {6}</li></ul><p>Wenn Sie Fragen haben, wenden Sie sich bitte an unsere Streitbeilegungsstelle.</p>
email.booking.approved.body=<h2>LuxeWay Buchung genehmigt</h2><p>Ihre Buchungsanfrage <b>#{0}</b> wurde vom Fahrzeughalter genehmigt.</p><ul><li><b>Fahrzeug:</b> {1} {2}</li><li><b>Mietzeitraum:</b> {3} bis {4}</li></ul><p>Bitte melden Sie sich in Ihrem Dashboard an, um die Übergabe bei Mietbeginn zu bestätigen.</p>
email.booking.rejected.body=<h2>LuxeWay Buchungsanfrage abgelehnt</h2><p>Ihre Buchungsanfrage <b>#{0}</b> wurde vom Fahrzeughalter abgelehnt.</p><p>Grund: {1}</p><p>Alle vorautorisierten Beträge oder Zahlungen wurden auf Ihr LuxeWallet oder das ursprüngliche Zahlungsmittel zurückerstattet.</p>
email.kyc.body=<h2>Update zur Identitätsprüfung</h2><p>Ihr hochgeladenes Dokument (<b>{0}</b>) wurde von unserem Compliance-Team überprüft.</p><p>Status: <b style='color: {1};'>{2}</b></p>{3}<p>Bitte sehen Sie in Ihrem Dashboard nach Details.</p>
email.vehicle.body=<h2>Überprüfung Ihres Fahrzeuginserats</h2><p>Ihr Inserat für <b>{0} {1} ({2})</b> wurde überprüft.</p><p>Status: <b style='color: {3};'>{4}</b></p>{5}<p>Vielen Dank für Ihre Partnerschaft mit LuxeWay.</p>
