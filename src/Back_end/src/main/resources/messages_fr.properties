# Email Body Templates
email.otp.body=<h2>Récupération de compte LuxeWay</h2><p>Vous avez demandé la réinitialisation de votre mot de passe. Votre code de vérification OTP est :</p><h1 style='color: #4F46E5; font-size: 32px; letter-spacing: 5px;'>{0}</h1><p>Ce code expirera dans 5 minutes. Si vous n''avez pas demandé cela, ignorez cet e-mail.</p>
email.reset.body=<h2>Récupération de compte LuxeWay</h2><p>Vous avez demandé la réinitialisation de votre mot de passe. Veuillez utiliser le lien ci-dessous pour le réinitialiser :</p><p><a href="{0}" style="display: inline-block; padding: 12px 24px; background-color: #4F46E5; color: white; text-decoration: none; border-radius: 4px; font-weight: bold;">Réinitialiser le mot de passe</a></p><p>Ou copiez et collez cette URL dans votre navigateur :</p><p>{0}</p><p>Ce lien expirera dans 15 minutes. Si vous n''avez pas demandé cela, ignorez cet e-mail.</p>
email.booking.confirm.body=<h2>Merci pour votre réservation LuxeWay !</h2><p>Votre réservation a été confirmée avec succès. En voici les détails :</p><ul><li><b>Véhicule :</b> {0} {1}</li><li><b>Période :</b> du {2} au {3}</li><li><b>Nombre de jours :</b> {4}</li><li><b>Montant total payé :</b> {5}</li></ul><p>Gérez votre réservation depuis votre tableau de bord client à tout moment.</p>
email.invoice.body=<h2>Votre facture PDF LuxeWay est prête</h2><p>Merci d''avoir choisi LuxeWay ! Vous trouverez ci-joint votre facture officielle <b>{0}</b> pour la réservation <b>#{1}</b>.</p><p>Montant total : <b>{2}</b></p><p>Veuillez consulter le PDF joint pour obtenir le détail des tarifs journaliers.</p>
email.dispute.body=<h2>Centre de résolution des litiges LuxeWay</h2><p>Le statut de votre dossier de litige <b>#{0}</b> a été mis à jour.</p><p>Nouveau statut : <b style='color: #DC2626;'>{1}</b></p><p>Notes de résolution actuelles : {2}</p>
email.reset.success.body=<h2>Réinitialisation réussie du mot de passe</h2><p>Le mot de passe de votre compte LuxeWay a été réinitialisé avec succès.</p><p>Si vous n''avez pas initié cette demande, veuillez contacter notre équipe d''assistance immédiatement.</p>
email.welcome.body=<h2>Bienvenue chez LuxeWay, {0} !</h2><p>Merci pour votre inscription. Votre adresse e-mail a été vérifiée avec succès et votre compte est désormais actif.</p><p>Connectez-vous pour rechercher des véhicules premium ou publier votre flotte.</p>
email.booking.cancel.body=<h2>Réservation LuxeWay annulée</h2><p>Votre réservation <b>#{0}</b> a été annulée.</p><ul><li><b>Véhicule :</b> {1} {2}</li><li><b>Dates :</b> du {3} au {4}</li><li><b>Nombre de jours :</b> {5}</li><li><b>Montant remboursé :</b> {6}</li></ul><p>Pour toute question, veuillez contacter notre centre de résolution des litiges.</p>
email.booking.approved.body=<h2>Réservation LuxeWay approuvée</h2><p>Votre demande de réservation <b>#{0}</b> a été approuvée par le propriétaire du véhicule.</p><ul><li><b>Véhicule :</b> {1} {2}</li><li><b>Dates :</b> du {3} au {4}</li></ul><p>Veuillez vous connecter à votre tableau de bord pour effectuer la confirmation de départ au début de la location.</p>
email.booking.rejected.body=<h2>Demande de réservation LuxeWay rejetée</h2><p>Votre demande de réservation <b>#{0}</b> a été rejetée par le propriétaire.</p><p>Motif : {1}</p><p>Tout montant pré-autorisé ou payé a été remboursé sur votre LuxeWallet ou votre moyen de paiement initial.</p>
email.kyc.body=<h2>Mise à jour de la vérification d''identité</h2><p>Le document que vous avez téléchargé (<b>{0}</b>) a été examiné par notre équipe de conformité.</p><p>Statut : <b style='color: {1};'>{2}</b></p>{3}<p>Vuiillez consulter votre tableau de bord pour plus de détails.</p>
email.vehicle.body=<h2>Modération de l''annonce de votre véhicule</h2><p>Votre annonce pour le véhicule <b>{0} {1} ({2})</b> a été examinée.</p><p>Statut : <b style='color: {3};'>{4}</b></p>{5}<p>Merci pour votre partenariat avec LuxeWay.</p>
