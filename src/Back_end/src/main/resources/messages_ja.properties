# Email Body Templates
email.otp.body=<h2>LuxeWay アカウントの回復</h2><p>パスワードの再設定が要求されました。あなたのOTP認証コードは以下になります：</p><h1 style='color: #4F46E5; font-size: 32px; letter-spacing: 5px;'>{0}</h1><p>このコードは5分間有効です。心当たりがない場合は、このメールを無視してください。</p>
email.reset.body=<h2>LuxeWay アカウントの回復</h2><p>パスワードの再設定が要求されました。以下のリンクからパスワードを再設定してください：</p><p><a href="{0}" style="display: inline-block; padding: 12px 24px; background-color: #4F46E5; color: white; text-decoration: none; border-radius: 4px; font-weight: bold;">パスワードの再設定</a></p><p>または、このURLをコピーしてブラウザに貼り付けてください：</p><p>{0}</p><p>このリンクは15分間有効です。心当たりがない場合は、このメールを無視してください。</p>
email.booking.confirm.body=<h2>LuxeWay でのご予約ありがとうございます！</h2><p>予約が正常に確定されました。詳細は以下の通りです：</p><ul><li><b>車両名:</b> {0} {1}</li><li><b>期間:</b> {2} から {3}</li><li><b>合計日数:</b> {4} 日</li><li><b>お支払い総額:</b> {5}</li></ul><p>ダッシュボードからいつでもご予約の管理が可能です。</p>
email.invoice.body=<h2>LuxeWay 請求書PDFのご案内</h2><p>LuxeWayをご利用いただきありがとうございます！ご予約<b>#{1}</b>に対する公式請求書<b>{0}</b>を添付いたしました。</p><p>合計金額: <b>{2}</b></p><p>詳細な料金内訳については、添付のPDFファイルをご参照ください。</p>
email.dispute.body=<h2>LuxeWay 紛争解決センター</h2><p>紛争チケット <b>#{0}</b> のステータスが更新されました。</p><p>新しいステータス: <b style='color: #DC2626;'>{1}</b></p><p>現在の解決に関するメモ: {2}</p>
email.reset.success.body=<h2>パスワード再設定完了</h2><p>LuxeWayアカウントのパスワードが正常に再設定されました。</p><p>パスワード変更の心当たりがない場合は、ただちにサポートチームまでご連絡ください。</p>
email.welcome.body=<h2>LuxeWayへようこそ、{0} 様！</h2><p>ご登録ありがとうございます。メールアドレスが確認され、アカウントが有効になりました。</p><p>ログインして高級車の検索や、ご自身の車両掲載を行ってください。</p>
email.booking.cancel.body=<h2>LuxeWay ご予約キャンセル</h2><p>ご予約 <b>#{0}</b> がキャンセルされました。</p><ul><li><b>車両名:</b> {1} {2}</li><li><b>期間:</b> {3} から {4}</li><li><b>合計日数:</b> {5} 日</li><li><b>返金金額:</b> {6}</li></ul><p>ご不明な点がございましたら、紛争解決センターまでお問い合わせください。</p>
email.booking.approved.body=<h2>LuxeWay ご予約承認</h2><p>ご予約リクエスト <b>#{0}</b> がオーナーによって承認されました。</p><ul><li><b>車両名:</b> {1} {2}</li><li><b>期間:</b> {3} から {4}</li></ul><p>レンタル開始時、ダッシュボードにログインしてチェックイン手続きを行ってください。</p>
email.booking.rejected.body=<h2>LuxeWay ご予約却下</h2><p>ご予約リクエスト <b>#{0}</b> はオーナーによって却下されました。</p><p>理由: {1}</p><p>事前承認またはお支払いいただいた金額は、LuxeWalletまたはお支払い方法に返金されました。</p>
email.kyc.body=<h2>本人確認審査状況の更新</h2><p>アップロードされた本人確認書類 (<b>{0}</b>) がコンプライアンスチームによって審査されました。</p><p>ステータス: <b style='color: {1};'>{2}</b></p>{3}<p>詳細についてはダッシュボードをご確認ください。</p>
email.vehicle.body=<h2>車両掲載審査状況の更新</h2><p>掲載申請された車両 <b>{0} {1} ({2})</b> の審査が完了しました。</p><p>ステータス: <b style='color: {3};'>{4}</b></p>{5}<p>LuxeWayのパートナーとしての活動に感謝いたします。</p>
