# Email Body Templates
email.otp.body=<h2>LuxeWay Account Recovery</h2><p>You requested a password reset. Your OTP verification code is:</p><h1 style='color: #4F46E5; font-size: 32px; letter-spacing: 5px;'>{0}</h1><p>This code will expire in 5 minutes. If you did not request this, please ignore this email.</p>
email.reset.body=<h2>LuxeWay Account Recovery</h2><p>You requested a password reset. Please use the link below to reset your password:</p><p><a href="{0}" style="display: inline-block; padding: 12px 24px; background-color: #4F46E5; color: white; text-decoration: none; border-radius: 4px; font-weight: bold;">Reset Password</a></p><p>Or copy and paste this URL into your browser:</p><p>{0}</p><p>This link will expire in 15 minutes. If you did not request this, please ignore this email.</p>
email.booking.confirm.body=<h2>Thank you for your LuxeWay booking!</h2><p>Your booking has been successfully confirmed. Below are the details:</p><ul><li><b>Vehicle:</b> {0} {1}</li><li><b>Period:</b> {2} to {3}</li><li><b>Total Days:</b> {4}</li><li><b>Total Paid:</b> {5}</li></ul><p>Manage your booking from your customer dashboard anytime.</p>
email.invoice.body=<h2>Your LuxeWay PDF Invoice is Ready</h2><p>Thank you for choosing LuxeWay! Attached is your official invoice <b>{0}</b> for booking <b>#{1}</b>.</p><p>Total Amount: <b>{2}</b></p><p>Please view the attached PDF for a full daily pricing breakdown.</p>
email.dispute.body=<h2>LuxeWay Dispute Resolution Center</h2><p>Your dispute ticket <b>#{0}</b> status has been updated.</p><p>New Status: <b style='color: #DC2626;'>{1}</b></p><p>Current Resolution Notes: {2}</p>
email.reset.success.body=<h2>Password Reset Success</h2><p>Your LuxeWay account password has been successfully reset.</p><p>If you did not initiate this request, please contact our support team immediately.</p>
email.welcome.body=<h2>Welcome to LuxeWay, {0}!</h2><p>Thank you for registering. Your email address has been successfully verified, and your account is active.</p><p>Log in to search premium vehicles or list your fleet.</p>
email.booking.cancel.body=<h2>LuxeWay Booking Cancelled</h2><p>Your booking <b>#{0}</b> has been cancelled.</p><ul><li><b>Vehicle:</b> {1} {2}</li><li><b>Dates:</b> {3} to {4}</li><li><b>Total Days:</b> {5}</li><li><b>Refund Amount:</b> {6}</li></ul><p>If you have any questions, please contact our dispute resolution center.</p>
email.booking.approved.body=<h2>LuxeWay Booking Approved</h2><p>Your booking request <b>#{0}</b> has been approved by the vehicle owner.</p><ul><li><b>Vehicle:</b> {1} {2}</li><li><b>Dates:</b> {3} to {4}</li></ul><p>Please log in to your dashboard to complete the check-in when rental starts.</p>
email.booking.rejected.body=<h2>LuxeWay Booking Request Rejected</h2><p>Your booking request <b>#{0}</b> was rejected by the owner.</p><p>Reason: {1}</p><p>Any pre-authorized hold or payment has been refunded to your LuxeWallet or payment method.</p>
email.kyc.body=<h2>Identity Verification Update</h2><p>Your uploaded document (<b>{0}</b>) has been reviewed by our compliance team.</p><p>Status: <b style='color: {1};'>{2}</b></p>{3}<p>Please view your dashboard for details.</p>
email.vehicle.body=<h2>Vehicle Listing Moderation</h2><p>Your listing for <b>{0} {1} ({2})</b> has been reviewed.</p><p>Status: <b style='color: {3};'>{4}</b></p>{5}<p>Thank you for partnering with LuxeWay.</p>

