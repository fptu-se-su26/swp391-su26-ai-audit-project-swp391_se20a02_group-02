<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="LuxeWay — Trusted luxury vehicle rental marketplace. Access the world's most exclusive fleet of supercars, luxury SUVs, and classic masterpieces." />
    <meta name="keywords" content="luxury car rental, supercar rental, vehicle marketplace, premium rentals" />
    <meta property="og:title" content="LuxeWay — Drive the Unattainable" />
    <meta property="og:description" content="Access the world's most exclusive fleet of supercars, luxury SUVs, and classic masterpieces with white-glove delivery." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <title>LuxeWay — Drive the Unattainable</title>
    <script>
      try {
        var prefs = localStorage.getItem('luxeway_ui_prefs');
        if (prefs) {
          var theme = JSON.parse(prefs).state.theme;
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
